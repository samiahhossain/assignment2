# render.yaml — Render deployment configuration
# Commit this file to the root of your repository.
# Render will detect it automatically on first deploy.

services:
  - type: web
    name: intellicare-api
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set this secret in the Render dashboard
      - key: JWT_SECRET
        sync: false          # Set this secret in the Render dashboard
      - key: JWT_EXPIRES_IN
        value: "900"
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: "604800"
      - key: ALLOWED_ORIGINS
        value: "https://intellicare.vercel.app"
